<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고배당 포트폴리오 위젯</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #0F172A; color: #F8FAFC; padding: 8px; }

        /* 🍩 상단 메인 영역: 도넛 그래프 + 색상 범례 */
        .top-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: #1E293B;
            border-radius: 8px;
            padding: 8px 12px;
            border: 1px solid #334155;
            margin-bottom: 6px;
        }

        /* 도넛 그래프 영역 */
        .chart-container {
            position: relative;
            width: 85px;
            height: 85px;
            flex-shrink: 0;
        }
        .chart-center-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 100%;
        }
        .chart-label { font-size: 8px; color: #94A3B8; }
        .chart-value { font-size: 10px; font-weight: bold; color: #38BDF8; margin-top: 1px; }

        /* 범례 (Legend) 목록 */
        .legend-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 3px 8px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            font-size: 8px;
            color: #CBD5E1;
        }
        .legend-color {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            margin-right: 4px;
            flex-shrink: 0;
        }

        /* 🛒 추천 매수 (가운데 정렬) */
        .buy-single-line-box {
            background: #1E293B;
            border-radius: 6px;
            padding: 5px 8px;
            border: 1px solid #334155;
            font-size: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
            overflow: hidden;
            text-align: center;
            margin-bottom: 6px;
        }
        .buy-title { color: #94A3B8; font-weight: bold; margin-right: 5px; flex-shrink: 0; }
        .buy-content { font-weight: bold; overflow: hidden; text-overflow: ellipsis; }

        /* 🥛 가운데 정렬된 물컵 배당금 게이지 */
        .cup-section {
            background: #1E293B;
            border-radius: 6px;
            padding: 5px 10px;
            border: 1px solid #334155;
            display: flex;
            align-items: center;
            justify-content: center; /* 전체 가운데 정렬 */
            gap: 8px;
            margin-bottom: 4px;
        }
        .cup-glass {
            width: 16px;
            height: 24px;
            border: 2px solid #38BDF8;
            border-top: none;
            border-radius: 0 0 4px 4px;
            position: relative;
            overflow: hidden;
            background: rgba(15, 23, 42, 0.6);
            flex-shrink: 0;
        }
        .cup-water {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(180deg, #38BDF8 0%, #3B82F6 100%);
            transition: height 0.5s ease-in-out;
            border-radius: 0 0 2px 2px;
        }
        .cup-info {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 8.5px;
        }
        .cup-title { color: #94A3B8; }
        .cup-val-group { font-weight: bold; display: flex; align-items: center; gap: 3px; }
        .cup-div-text { color: #F8FAFC; }
        .cup-percent-text { color: #38BDF8; }

        /* 하단 잔액 정보 */
        .footer-info { 
            display: flex; 
            justify-content: space-between; 
            font-size: 8px; 
            color: #64748B; 
            padding: 0 2px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <!-- 🔝 상단 영역: 도넛 그래프(가운데: 총 자산) + 범례 -->
    <div class="top-section">
        <div class="chart-container">
            <canvas id="assetChart"></canvas>
            <div class="chart-center-text">
                <div class="chart-label">총 자산</div>
                <div class="chart-value" id="total-asset-center">0원</div>
            </div>
        </div>

        <!-- 종목 색상 범례 -->
        <div class="legend-container" id="legend-list"></div>
    </div>

    <!-- 🛒 이달의 추천 매수 (가운데 정렬) -->
    <div class="buy-single-line-box">
        <span class="buy-title">🛒 추천 매수:</span>
        <span class="buy-content" id="buy-summary">계산 중...</span>
    </div>

    <!-- 🥛 물컵 배당금 게이지 (가운데 정렬) -->
    <div class="cup-section">
        <div class="cup-glass">
            <div class="cup-water" id="cup-water-level" style="height: 0%;"></div>
        </div>
        <div class="cup-info">
            <span class="cup-title">월 배당금 (목표 50만):</span>
            <div class="cup-val-group">
                <span class="cup-div-text" id="monthly-div">0원</span>
                <span class="cup-percent-text" id="cup-percent-val">(0%)</span>
            </div>
        </div>
    </div>

    <!-- 하단 정보 (좌측: 주식/적금 상세 / 우측: 이월 예수금) -->
    <div class="footer-info">
        <span id="asset-detail-sub">주식 0만 + 적금 0만</span>
        <span id="rem-budget">이월 예수금: $0.00</span>
    </div>

    <script>
        // === 기본 설정 ===
        const EXCHANGE_RATE = 1380;            // 환율
        const MONTHLY_BUDGET_KRW = 150000;     // 월 적립 매수금 (15만원)
        const TARGET_MONTHLY_DIV_KRW = 500000; // 최종 월 배당 목표 (50만원)

        // === 🪖 군적금 자동 계산 설정 (매달 10일 55만원 자동 증가) ===
        const BASE_DATE = new Date(2026, 6, 10); // 2026-07-10 (3개월차: 165만원)
        const BASE_SAVINGS = 1650000;
        const MONTHLY_SAVINGS = 550000;
        const TARGET_DATE = new Date(2028, 0, 10); // 2028-01-10 만기
        const MAX_MILITARY_SAVINGS = 11550000;

        function calculateMilitarySavings() {
            const today = new Date();
            if (today < BASE_DATE) return BASE_SAVINGS;
            if (today >= TARGET_DATE) return MAX_MILITARY_SAVINGS;

            let monthsPassed = (today.getFullYear() - BASE_DATE.getFullYear()) * 12 + (today.getMonth() - BASE_DATE.getMonth());
            if (today.getDate() < 10) monthsPassed -= 1;
            monthsPassed = Math.max(0, monthsPassed);

            return Math.min(MAX_MILITARY_SAVINGS, BASE_SAVINGS + (monthsPassed * MONTHLY_SAVINGS));
        }

        const MILITARY_SAVINGS_KRW = calculateMilitarySavings();

        // 🎨 종목 기본 정보 및 고유 테마 색상
        const STOCKS = {
            "JEPQ": { price: 54.50, yield: 0.092, target: 0.30, color: "#38BDF8" },
            "MAIN": { price: 48.00, yield: 0.062, target: 0.20, color: "#34D399" },
            "VZ":   { price: 41.50, yield: 0.065, target: 0.15, color: "#A78BFA" },
            "ARCC": { price: 21.00, yield: 0.091, target: 0.15, color: "#F472B6" },
            "MO":   { price: 45.00, yield: 0.087, target: 0.20, color: "#FB923C" }
        };

        // 📌 실제 보유 주식 수량 (매수 시 수정)
        const HOLDINGS = {
            "JEPQ": 0,
            "MAIN": 0,
            "VZ":   0,
            "ARCC": 0,
            "MO":   0
        };

        // --- 계산 엔진 ---
        const MONTHLY_BUDGET_USD = MONTHLY_BUDGET_KRW / EXCHANGE_RATE;
        let stockValUSD = 0;
        let totalAnnualDivUSD = 0;
        let stockValuesKRW = {};

        for (let t in HOLDINGS) {
            let valUSD = HOLDINGS[t] * STOCKS[t].price;
            stockValUSD += valUSD;
            totalAnnualDivUSD += valUSD * STOCKS[t].yield;
            stockValuesKRW[t] = Math.floor(valUSD * EXCHANGE_RATE);
        }

        let stockValKRW = Math.floor(stockValUSD * EXCHANGE_RATE);
        let totalAssetKRW = stockValKRW + MILITARY_SAVINGS_KRW;
        let monthlyDivKRW = Math.floor((totalAnnualDivUSD * 0.846 / 12) * EXCHANGE_RATE);

        // UI 정보 업데이트
        document.getElementById("total-asset-center").innerText = `${(totalAssetKRW / 10000).toFixed(0)}만원`;
        document.getElementById("monthly-div").innerText = monthlyDivKRW.toLocaleString() + "원";
        document.getElementById("asset-detail-sub").innerText = `주식 ${(stockValKRW / 10000).toFixed(0)}만 + 적금 ${(MILITARY_SAVINGS_KRW / 10000).toFixed(0)}만`;

        // 🥛 컵 물 채우기 계산 (목표 50만원 기준)
        let divPercent = Math.min(100, (monthlyDivKRW / TARGET_MONTHLY_DIV_KRW) * 100).toFixed(1);
        document.getElementById("cup-water-level").style.height = divPercent + "%";
        document.getElementById("cup-percent-val").innerText = `(${divPercent}%)`;

        // === 🎨 범례(Legend) UI 생성 ===
        let legendHTML = "";
        for (let t in STOCKS) {
            legendHTML += `
                <div class="legend-item">
                    <div class="legend-color" style="background-color: ${STOCKS[t].color};"></div>
                    <span>${t}</span>
                </div>
            `;
        }
        legendHTML += `
            <div class="legend-item">
                <div class="legend-color" style="background-color: #FACC15;"></div>
                <span>군적금</span>
            </div>
        `;
        document.getElementById("legend-list").innerHTML = legendHTML;

        // === 🍩 원형 도넛 그래프 생성 ===
        const labels = [...Object.keys(STOCKS), "군적금"];
        const dataValues = [...Object.keys(STOCKS).map(t => stockValuesKRW[t]), MILITARY_SAVINGS_KRW];
        const colors = [...Object.keys(STOCKS).map(t => STOCKS[t].color), "#FACC15"];

        const hasAsset = dataValues.some(v => v > 0);
        const finalData = hasAsset ? dataValues : [0, 0, 0, 0, 0, 1];

        const ctx = document.getElementById('assetChart').getContext('2d');
        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{
                    data: finalData,
                    backgroundColor: colors,
                    borderWidth: 0,
                    hoverOffset: 2
                }]
            },
            options: {
                cutout: '70%',
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: { enabled: true }
                }
            }
        });

        // === 🛒 한 줄 추천 매수 계산 ===
        let gaps = [];
        for (let t in STOCKS) {
            let currVal = HOLDINGS[t] * STOCKS[t].price;
            let targetVal = (stockValUSD + MONTHLY_BUDGET_USD) * STOCKS[t].target;
            gaps.push({ ticker: t, gap: targetVal - currVal });
        }

        gaps.sort((a, b) => b.gap - a.gap);

        let remBudget = MONTHLY_BUDGET_USD;
        let buyItems = [];

        for (let item of gaps) {
            let t = item.ticker;
            let price = STOCKS[t].price;
            let color = STOCKS[t].color;

            if (remBudget >= price) {
                let count = Math.floor(remBudget / price);
                remBudget -= count * price;
                buyItems.push(`<span style="color:${color};">${t} +${count}주</span>`);
            }
        }

        if (buyItems.length > 0) {
            document.getElementById("buy-summary").innerHTML = buyItems.join(" | ");
        } else {
            document.getElementById("buy-summary").innerHTML = `<span style="color:#64748B;">이월 (잔액 부족)</span>`;
        }

        document.getElementById("rem-budget").innerText = `이월 예수금: $${remBudget.toFixed(2)}`;
    </script>
</body>
</html>
