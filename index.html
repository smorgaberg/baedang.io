<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고배당 포트폴리오 위젯</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #0F172A; color: #F8FAFC; padding: 10px; }
        
        /* 상단 스탯바 (4개 카드로 분할) */
        .status-container { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 6px; 
            margin-bottom: 12px; 
        }
        .status-box {
            background: #1E293B; 
            border-radius: 8px; 
            padding: 8px 6px;
            text-align: center; 
            border: 1px solid #334155;
        }
        .status-title { font-size: 10px; color: #94A3B8; margin-bottom: 2px; }
        .status-value { font-size: 14px; font-weight: bold; color: #38BDF8; }
        .highlight-value { color: #4ADE80; } /* 총자산 강조 색상 (초록) */
        .military-value { color: #FACC15; }  /* 군적금 강조 색상 (노랑) */

        /* 이번 달 매수 섹션 */
        .section-title { font-size: 12px; font-weight: bold; color: #CBD5E1; margin-bottom: 6px; display: flex; justify-content: space-between; }
        .buy-card {
            background: #1E293B; 
            border-left: 4px solid #3B82F6;
            padding: 8px 10px; 
            margin-bottom: 5px; 
            border-radius: 6px;
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
        .ticker { font-size: 14px; font-weight: bold; color: #FFF; }
        .price-sub { font-size: 11px; color: #64748B; margin-left: 4px; }
        .qty { font-size: 14px; font-weight: bold; color: #60A5FA; }

        /* 하단 잔액 */
        .footer-info { font-size: 10px; color: #64748B; text-align: right; margin-top: 6px; }
    </style>
</head>
<body>

    <!-- 스탯바 (4개 영역) -->
    <div class="status-container">
        <div class="status-box">
            <div class="status-title">📈 주식 평가금</div>
            <div class="status-value" id="stock-asset">0원</div>
        </div>
        <div class="status-box">
            <div class="status-title">🪖 군적금 자산</div>
            <div class="status-value military-value" id="military-asset">165만원</div>
        </div>
        <div class="status-box">
            <div class="status-title">💰 총합계 자산</div>
            <div class="status-value highlight-value" id="total-asset">0원</div>
        </div>
        <div class="status-box">
            <div class="status-title">💵 월 예상 배당</div>
            <div class="status-value" id="monthly-div">0원</div>
        </div>
    </div>

    <!-- 이번 달 추천 매수 목록 -->
    <div class="section-title">
        <span>🛒 이번 달 추천 매수</span>
        <span style="font-size: 10px; font-weight: normal; color: #94A3B8;">(월 15만원 기준)</span>
    </div>
    <div id="buy-list"></div>

    <!-- 하단 이월 예수금 -->
    <div class="footer-info" id="rem-budget">이월 예수금: $0.00</div>

    <script>
        // === 사용자 기본 설정 ===
        const EXCHANGE_RATE = 1380;            // 환율
        const MONTHLY_BUDGET_KRW = 150000;     // 월 적립 매수금 (15만원)
        const MILITARY_SAVINGS_KRW = 1650000;  // 군적금 현금 (165만원)

        const MONTHLY_BUDGET_USD = MONTHLY_BUDGET_KRW / EXCHANGE_RATE;

        // 종목 기본 정보
        const STOCKS = {
            "JEPQ": { price: 54.50, yield: 0.092, target: 0.30 },
            "MAIN": { price: 48.00, yield: 0.062, target: 0.20 },
            "VZ":   { price: 41.50, yield: 0.065, target: 0.15 },
            "ARCC": { price: 21.00, yield: 0.091, target: 0.15 },
            "MO":   { price: 45.00, yield: 0.087, target: 0.20 }
        };

        // 📌 [중요] 실제 살 때마다 아래 주식 수량을 수정해 주시면 됩니다!
        const HOLDINGS = {
            "JEPQ": 0,
            "MAIN": 0,
            "VZ":   0,
            "ARCC": 0,
            "MO":   0
        };

        // --- 계산 엔진 ---
        let stockValUSD = 0;
        let totalAnnualDivUSD = 0;

        for (let t in HOLDINGS) {
            let val = HOLDINGS[t] * STOCKS[t].price;
            stockValUSD += val;
            totalAnnualDivUSD += val * STOCKS[t].yield;
        }

        let stockValKRW = Math.floor(stockValUSD * EXCHANGE_RATE);
        let totalAssetKRW = stockValKRW + MILITARY_SAVINGS_KRW; // 주식자산 + 군적금
        let monthlyDivKRW = Math.floor((totalAnnualDivUSD * 0.846 / 12) * EXCHANGE_RATE);

        // UI 스탯바 갱신
        document.getElementById("stock-asset").innerText = (stockValKRW / 10000).toFixed(0) + "만원";
        document.getElementById("military-asset").innerText = (MILITARY_SAVINGS_KRW / 10000).toFixed(0) + "만원";
        document.getElementById("total-asset").innerText = (totalAssetKRW / 10000).toFixed(0) + "만원";
        document.getElementById("monthly-div").innerText = monthlyDivKRW.toLocaleString() + "원";

        // 추천 매수 수량 계산
        let gaps = [];
        for (let t in STOCKS) {
            let currVal = HOLDINGS[t] * STOCKS[t].price;
            let targetVal = (stockValUSD + MONTHLY_BUDGET_USD) * STOCKS[t].target;
            gaps.push({ ticker: t, gap: targetVal - currVal });
        }

        gaps.sort((a, b) => b.gap - a.gap);

        let remBudget = MONTHLY_BUDGET_USD;
        let buyListHTML = "";
        let hasBuy = false;

        for (let item of gaps) {
            let t = item.ticker;
            let price = STOCKS[t].price;
            if (remBudget >= price) {
                let count = Math.floor(remBudget / price);
                remBudget -= count * price;
                hasBuy = true;

                buyListHTML += `
                    <div class="buy-card">
                        <div>
                            <span class="ticker">${t}</span>
                            <span class="price-sub">($${price})</span>
                        </div>
                        <div class="qty">+${count}주 <span style="font-size:10px; color:#94A3B8;">($${(count*price).toFixed(1)})</span></div>
                    </div>
                `;
            }
        }

        if (!hasBuy) {
            buyListHTML = `<div style="font-size:11px; color:#64748B; text-align:center; padding:8px;">이번 달은 잔액 부족으로 이월됩니다.</div>`;
        }

        document.getElementById("buy-list").innerHTML = buyListHTML;
        document.getElementById("rem-budget").innerText = `이월 예수금: $${remBudget.toFixed(2)} (${Math.floor(remBudget * EXCHANGE_RATE).toLocaleString()}원)`;
    </script>
</body>
</html>
